<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>
<link rel="stylesheet" href="style.css">
<h1>Student Dashboard</h1>

<div class="card">

<script type="module" src="dashboard.js"></script>

</body>
</html>
